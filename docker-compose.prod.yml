# Production deployment on EC2
# Usage: docker-compose -f docker-compose.prod.yml up -d --build
version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: donggamerank-server
    env_file:
      - apps/server/.env
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: donggamerank-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
